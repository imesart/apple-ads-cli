name: Enhancement
description: Suggest a feature, behavior improvement, or documentation improvement.
title: "enhancement: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What should be improved?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI behavior
        - API coverage
        - Documentation
        - Testing
        - Build or release
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, examples, prompts, or related Apple Ads API documentation if useful.
    validations:
      required: false
