name: Question
description: Ask for clarification, usage help, or design discussion.
title: "question: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, tokens, private keys, customer data, or real account IDs.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include commands, docs links, or examples if relevant. Redact sensitive values.
    validations:
      required: false
